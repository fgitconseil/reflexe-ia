<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Card / terminal window -->
  <rect x="28" y="44" width="144" height="112" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="3"/>
  <!-- Title bar separator -->
  <line x1="28" y1="70" x2="172" y2="70" stroke="#16A34A" stroke-width="2"/>
  <!-- 3 dots -->
  <circle cx="46" cy="57" r="5" fill="#16A34A"/>
  <circle cx="62" cy="57" r="5" fill="#86EFAC"/>
  <circle cx="78" cy="57" r="5" fill="#86EFAC"/>
  <!-- Cursor chevron (→) instead of text -->
  <polyline points="46,89 56,97 46,105" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Blinking cursor bar -->
  <rect x="62" y="88" width="4" height="18" rx="2" fill="#16A34A"/>
  <!-- Content lines -->
  <rect x="46" y="118" width="84" height="6" rx="3" fill="#BBF7D0"/>
  <rect x="46" y="132" width="64" height="6" rx="3" fill="#BBF7D0"/>
  <rect x="46" y="146" width="74" height="6" rx="3" fill="#DCFCE7"/>
</svg>
