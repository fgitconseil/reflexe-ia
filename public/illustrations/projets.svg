<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Stacked document / folder cards -->
  <!-- Back card -->
  <rect x="52" y="62" width="104" height="80" rx="8" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2.5"/>
  <!-- Middle card with tab -->
  <rect x="44" y="52" width="104" height="80" rx="8" fill="#FEF3C7" stroke="#CA8A04" stroke-width="2.5"/>
  <rect x="44" y="52" width="32" height="10" rx="4 4 0 0" fill="#CA8A04"/>
  <!-- Front card with tab -->
  <rect x="36" y="72" width="104" height="80" rx="8" fill="white" stroke="#CA8A04" stroke-width="2.5"/>
  <rect x="36" y="72" width="36" height="10" rx="4 4 0 0" fill="#CA8A04"/>
  <!-- Document lines on front card -->
  <rect x="50" y="94"  width="68" height="6" rx="3" fill="#FEF3C7"/>
  <rect x="50" y="108" width="52" height="6" rx="3" fill="#FEF3C7"/>
  <rect x="50" y="122" width="60" height="6" rx="3" fill="#FEF3C7"/>
</svg>
