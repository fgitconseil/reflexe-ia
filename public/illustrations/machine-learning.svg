<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Neural network — intro palette #2563EB -->
  <!-- Outer connections -->
  <line x1="100" y1="100" x2="52"  y2="58"  stroke="#BFDBFE" stroke-width="2"/>
  <line x1="100" y1="100" x2="148" y2="58"  stroke="#BFDBFE" stroke-width="2"/>
  <line x1="100" y1="100" x2="52"  y2="142" stroke="#BFDBFE" stroke-width="2"/>
  <line x1="100" y1="100" x2="148" y2="142" stroke="#BFDBFE" stroke-width="2"/>
  <line x1="100" y1="100" x2="32"  y2="100" stroke="#BFDBFE" stroke-width="2"/>
  <line x1="100" y1="100" x2="168" y2="100" stroke="#BFDBFE" stroke-width="2"/>
  <!-- Cross connections -->
  <line x1="52"  y1="58"  x2="148" y2="58"  stroke="#DBEAFE" stroke-width="1.5"/>
  <line x1="52"  y1="142" x2="148" y2="142" stroke="#DBEAFE" stroke-width="1.5"/>
  <line x1="52"  y1="58"  x2="52"  y2="142" stroke="#DBEAFE" stroke-width="1.5"/>
  <line x1="148" y1="58"  x2="148" y2="142" stroke="#DBEAFE" stroke-width="1.5"/>
  <!-- Outer nodes -->
  <circle cx="52"  cy="58"  r="13" fill="white" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="148" cy="58"  r="13" fill="white" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="52"  cy="142" r="13" fill="white" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="148" cy="142" r="13" fill="white" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="32"  cy="100" r="10" fill="white" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="168" cy="100" r="10" fill="white" stroke="#93C5FD" stroke-width="2"/>
  <!-- Central node -->
  <circle cx="100" cy="100" r="22" fill="#2563EB"/>
  <circle cx="100" cy="100" r="11" fill="white"/>
  <circle cx="100" cy="100" r="5"  fill="#2563EB"/>
</svg>
